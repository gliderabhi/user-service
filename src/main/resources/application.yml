server:
  port: 0

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: sevis
    password: SevisDb@2024
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

jwt:
  secret: sevis-automobile-transport-secret-key-2024-must-be-at-least-256-bits
  expiration-ms: 86400000  # 24 hours

session:
  cleanup-cron: "0 */5 * * * *"  # every 5 minutes

google:
  # Web Sign-In client (used by the Angular app's GSI button) plus the TV/Limited-Input
  # client (used by the Android TV app's device-code/QR sign-in flow) — an ID token's
  # `aud` claim will match whichever client actually issued it, so both must be accepted.
  # Comma-separated (not a YAML list): @Value can't reliably bind a List<String> from a
  # YAML sequence, since there's no flat property key for it to resolve.
  client-ids: 1059813087193-btfkk2bhtj50grqjta6anvo5i7vq77pl.apps.googleusercontent.com,1059813087193-v2ktnlvo5vu60g18dsacdr34jqtut5pq.apps.googleusercontent.com

management:
  endpoints:
    web:
      exposure:
        include: health,info
